<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Delivery Checker</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  padding: 15px;
}

.card{
  background: white;
  padding: 20px;
  border-radius: 16px;
  max-width: 95%;
  margin: auto;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

h2{
  text-align: center;
  margin-bottom: 25px;
  color: #333;
  font-size: 22px;
}

table{
  width: 100%;
  border-collapse: collapse;
}

th, td{
  padding: 10px;
  text-align: center;
  font-size: 16px;
}

th{
  background: #e9eef5;
}

input{
  width: 95%;
  padding: 10px;
  font-size: 18px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button{
  padding: 15px;
  margin-top: 20px;
  width: 100%;
  font-size: 18px;
  background: #2c7be5;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover{
  background: #1a5fc1;
}

#result{
  margin-top: 25px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}

/* Result message cards */
.ok{
  background: #d4edda;
  color: #155724;
  padding: 14px 20px;
  border-radius: 10px;
  width: 90%;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

.warn{
  background: #f8d7da;
  color: #721c24;
  padding: 14px 20px;
  border-radius: 10px;
  width: 90%;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

@media(max-width:600px){
  th, td{font-size:14px;}
  input{font-size:16px;}
  .ok, .warn{width: 95%; font-size:16px; padding:12px;}
}
</style>
</head>

<body>

<div class="card">

<h2>Fuel Delivery Checker</h2>

<table>
<tr>
<th>Product</th>
<th>Before</th>
<th>After</th>
<th>Invoice</th>
</tr>

<tr>
<td>Regular</td>
<td><input id="r_before"></td>
<td><input id="r_after"></td>
<td><input id="r_invoice"></td>
</tr>

<tr>
<td>Premium</td>
<td><input id="p_before"></td>
<td><input id="p_after"></td>
<td><input id="p_invoice"></td>
</tr>

<tr>
<td>Diesel</td>
<td><input id="d_before"></td>
<td><input id="d_after"></td>
<td><input id="d_invoice"></td>
</tr>
</table>

<button onclick="check()">Check Delivery</button>

<div id="result"></div>

</div>

<script>
function evaluate(name,before,after,invoice){
 

  let delivered = after - before
  let diff = delivered - invoice
  let absdelivered = Math.abs(delivered)
  let absDiff = Math.abs(diff)

   if(invoice === 0){
     if(after >= before + 1000){
      return `<div class="warn">${name}: Not Delivered But Over | Difference ${diff} L ⚠️</div>`
      
     }else if (after < before && after <= 1000) {
    return `<div class="warn">${name}: Gas is Low ⚠️</div>`;
      }
     else{
      
    return `<div class="ok">${name}: Not Delivered |  Difference ${diff} L </div>`
       }
  }

  if(absDiff <= 700){
      return `<div class="ok">${name}: Delivered ⛽ | Difference ${diff} L ✔️</div>`
  }else{
      return `<div class="warn">${name}: Delivered ⛽ | Difference ${diff} L ⚠️</div>`
  }
}

function check(){
  let r_before_v = +r_before.value
  let r_after_v = +r_after.value
  let r_invoice_v = +r_invoice.value

  let p_before_v = +p_before.value
  let p_after_v = +p_after.value
  let p_invoice_v = +p_invoice.value

  let d_before_v = +d_before.value
  let d_after_v = +d_after.value
  let d_invoice_v = +d_invoice.value

  let html=""
  html += evaluate("Regular",r_before_v,r_after_v,r_invoice_v)
  html += evaluate("Premium",p_before_v,p_after_v,p_invoice_v)
  html += evaluate("Diesel",d_before_v,d_after_v,d_invoice_v)

  result.innerHTML = html
}
</script>

</body>
</html>
